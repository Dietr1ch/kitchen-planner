<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Planner - Gantt Chart</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  color: #333; background: #f7f7f7; min-height: 100vh;
}
h1 { font-size: 1.5rem; text-align: center; color: #222; }
.header { text-align: center; padding: 1.5rem 1rem 0.5rem; }
.header p { color: #888; font-size: 0.9rem; margin-top: 0.25rem; }
.plan-info { text-align: center; padding: 0 1rem 1rem; display: none; }
.plan-info p { color: #666; font-size: 0.95rem; }

.drop-zone {
  border: 2px dashed #bbb; border-radius: 12px; padding: 3rem 2rem;
  text-align: center; cursor: pointer; transition: all 0.2s;
  margin: 1.5rem auto; max-width: 500px; background: #fff;
}
.drop-zone:hover, .drop-zone.drag-over {
  border-color: #4caf50; background: #f1faf1;
}
.drop-zone p { color: #888; margin-top: 0.5rem; font-size: 0.9rem; }
.drop-zone .icon { font-size: 2.5rem; color: #bbb; }
.drop-zone.drag-over .icon { color: #4caf50; }
.drop-zone.has-plan {
  max-width: 200px; padding: 0.6rem 1rem; cursor: pointer;
  border-style: solid; border-color: #ddd;
}
.drop-zone.has-plan:hover { border-color: #e53935; background: #fff5f5; }
.drop-zone.has-plan .icon { font-size: 1rem; }
.drop-zone.has-plan p { margin-top: 0; color: #555; }
#file-input { display: none; }
#error-msg { color: #e53935; text-align: center; margin: 0.5rem 0; font-size: 0.85rem; display: none; }

.gantt-wrap { display: none; margin: 0 auto; padding: 0 1rem 2rem; max-width: 1200px; }
.gantt-wrap.visible { display: block; }
table {
  width: 100%; border-collapse: collapse; background: #fff;
  border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
th {
  background: #f5f5f5; text-align: left; padding: 10px 12px;
  border-bottom: 2px solid #ddd; font-weight: 600; font-size: 0.85rem;
  white-space: nowrap;
}
td { padding: 8px 12px; border-bottom: 1px solid #eee; vertical-align: middle; font-size: 0.85rem; }
tr:last-child td { border-bottom: none; }
tr:hover { background: #fafafa; }

.bar-container {
  background: #f0f0f0; border-radius: 4px; height: 26px;
  position: relative; min-width: 180px; overflow: hidden;
}
.bar {
  background: #4caf50; height: 26px; border-radius: 4px;
  display: flex; align-items: center; padding: 0 8px;
  color: #fff; font-size: 0.75rem; white-space: nowrap;
  box-sizing: border-box; cursor: pointer; transition: background 0.15s;
  min-width: fit-content;
}

tr.dep-upstream { background: #fff3e0 !important; }
tr.dep-upstream .bar { background: #ff9800 !important; }
tr.dep-downstream { background: #e3f2fd !important; }
tr.dep-downstream .bar { background: #2196f3 !important; }

@media (max-width: 700px) {
  .bar-container { min-width: 100px; }
  th, td { padding: 6px 8px; font-size: 0.78rem; }
}
</style>
</head>
<body>

<div class="header">
  <h1>Kitchen Planner — Gantt Chart</h1>
  <p>Load a plan.json to visualise the cooking schedule</p>
</div>

<div id="error-msg"></div>

<div class="drop-zone" id="dropZone">
  <div class="icon">&#128203;</div>
  <p><strong>Drop plan.json here</strong><br>or click to select a file</p>
  <input type="file" id="file-input" accept=".json,application/json">
</div>

<div class="plan-info" id="planInfo">
  <p>Plan start time: <span id="startTime"></span></p>
</div>

<div class="gantt-wrap" id="ganttWrap">
  <table id="ganttTable">
    <thead>
      <tr>
        <th>Duration</th>
        <th>Task</th>
        <th>Dependencies</th>
        <th>Cook</th>
        <th>Resource</th>
      </tr>
    </thead>
    <tbody id="ganttBody"></tbody>
  </table>
</div>

<script>
(function () {
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('file-input');
  const ganttWrap = document.getElementById('ganttWrap');
  const ganttBody = document.getElementById('ganttBody');
  const planInfo = document.getElementById('planInfo');
  const startTimeSpan = document.getElementById('startTime');
  const errorMsg = document.getElementById('error-msg');

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = msg ? 'block' : 'none';
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function shortDeps(deps) {
    return deps.map(function (d) {
      var parts = d.split(':');
      return parts[parts.length - 1];
    }).join(', ');
  }

  function renderPlan(plan) {
    showError('');
    var tasks = plan.tasks.slice().sort(function (a, b) {
      return a.start_offset_minutes - b.start_offset_minutes;
    });
    var totalDuration = tasks.reduce(function (max, t) {
      return Math.max(max, t.start_offset_minutes + t.duration_minutes);
    }, 0) || 1;
    var totalF = totalDuration;

    var rows = '';
    for (var i = 0; i < tasks.length; i++) {
      var t = tasks[i];
      var start = t.start_offset_minutes;
      var end = start + t.duration_minutes;
      var offsetPct = (start / totalF * 100).toFixed(0);
      var widthPct = Math.max(1, (t.duration_minutes / totalF * 100).toFixed(0));
      var barLabel = start + '\u2013' + end;
      var taskId = escapeHtml(t.id || '');
      var depIds = (t.dependencies || []).map(escapeHtml).join(', ');
      var desc = escapeHtml(t.description);
      var deps = shortDeps(t.dependencies || []);
      var cook = escapeHtml(t.cook || '(none)');
      var resource = escapeHtml(t.resource_id || '(none)');

      rows += '<tr data-task-id="' + taskId + '" data-depends-on="' + depIds + '">'
        + '<td><div class="bar-container"><div class="bar" style="margin-left:' + offsetPct + '%;width:' + widthPct + '%;">' + barLabel + '</div></div></td>'
        + '<td>' + desc + '</td>'
        + '<td>' + deps + '</td>'
        + '<td>' + cook + '</td>'
        + '<td>' + resource + '</td>'
        + '</tr>\n';
    }

    ganttBody.innerHTML = rows;
    startTimeSpan.textContent = plan.start_time || '(not set)';
    planInfo.style.display = 'block';
    ganttWrap.classList.add('visible');
    dropZone.classList.add('has-plan');
    dropZone.querySelector('.icon').style.display = 'none';
    dropZone.querySelector('p').innerHTML = 'Load another plan';
    document.querySelector('.header p').textContent = '';
  }

  function loadFromFile(file) {
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function (e) {
      try {
        var plan = JSON.parse(e.target.result);
        if (!plan.tasks || !Array.isArray(plan.tasks)) {
          showError('Invalid plan: missing "tasks" array');
          return;
        }
        renderPlan(plan);
      } catch (err) {
        showError('Invalid JSON: ' + err.message);
      }
    };
    reader.onerror = function () { showError('Failed to read file'); };
    reader.readAsText(file);
  }

  function loadFromUrl(url) {
    showError('Loading plan from URL...');
    fetch(url)
      .then(function (r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function (plan) {
        if (!plan.tasks || !Array.isArray(plan.tasks)) {
          showError('Invalid plan: missing "tasks" array');
          return;
        }
        renderPlan(plan);
      })
      .catch(function (err) {
        showError('Failed to load plan from URL: ' + err.message);
      });
  }

  // File input change
  fileInput.addEventListener('change', function () {
    if (fileInput.files.length > 0) loadFromFile(fileInput.files[0]);
  });

  // Drop zone click
  dropZone.addEventListener('click', function () { fileInput.click(); });

  // Drag-and-drop
  dropZone.addEventListener('dragover', function (e) {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });
  dropZone.addEventListener('dragleave', function () {
    dropZone.classList.remove('drag-over');
  });
  dropZone.addEventListener('drop', function (e) {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files.length > 0) loadFromFile(e.dataTransfer.files[0]);
  });

  // Hover highlighting
  var ganttTable = document.getElementById('ganttTable');
  ganttTable.addEventListener('mouseover', function (e) {
    var row = e.target.closest('tr[data-task-id]');
    if (!row) return;
    var taskId = row.dataset.taskId;
    var deps = (row.dataset.dependsOn || '').split(/,\s*/).filter(Boolean);
    deps.forEach(function (id) {
      var dep = document.querySelector('tr[data-task-id="' + id + '"]');
      if (dep) dep.classList.add('dep-upstream');
    });
    document.querySelectorAll('tr[data-depends-on]').forEach(function (other) {
      var otherDeps = (other.dataset.dependsOn || '').split(/,\s*/).filter(Boolean);
      if (otherDeps.indexOf(taskId) !== -1) other.classList.add('dep-downstream');
    });
  });
  ganttTable.addEventListener('mouseout', function (e) {
    var row = e.target.closest('tr[data-task-id]');
    if (!row) return;
    document.querySelectorAll('.dep-upstream, .dep-downstream').forEach(function (el) {
      el.classList.remove('dep-upstream', 'dep-downstream');
    });
  });

  // Init: check ?url= query param
  var params = new URLSearchParams(window.location.search);
  var urlParam = params.get('url');
  if (urlParam) loadFromUrl(urlParam);
})();
</script>
</body>
</html>
